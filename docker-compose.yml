services:
  postgres:
    image: postgres:16-alpine
    container_name: ai-voice-assistant-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: ai_voice_assistant
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d ai_voice_assistant"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
